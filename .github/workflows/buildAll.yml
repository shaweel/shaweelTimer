name: Build All

on:
  push:
    branches: [stable, dev]
  pull_request:
    branches: [stable, dev]

jobs:
  buildDeb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Fetch metadata
        run: |
          fetchMetadataValue() {
            curl -s https://raw.githubusercontent.com/shaweel/shaweelTimer/refs/heads/${{ github.ref_name }}/metadata.json \
            | grep -o "\"$1\": *\"[^\"]*\"" \
            | sed 's/.*: *"\(.*\)"/\1/'
          }
          echo "PACKAGE_NAME=$(fetchMetadataValue "packageName")" >> $GITHUB_ENV
          echo "DESCRIPTION=$(fetchMetadataValue "description")" >> $GITHUB_ENV
          echo "VERSION=$(fetchMetadataValue "version")" >> $GITHUB_ENV
          echo "URL=$(fetchMetadataValue "url")" >> $GITHUB_ENV
          echo "MAINTAINER=$(fetchMetadataValue "maintainer")" >> $GITHUB_ENV
          echo "MAINTAINER_EMAIL=$(fetchMetadataValue "maintainerEmail")" >> $GITHUB_ENV
      - name: Create control file
        run: |
          mkdir -p $GITHUB_WORKSPACE/pkg/DEBIAN
          {
          echo "Package: $PACKAGE_NAME"
          echo "Description: $DESCRIPTION"
          echo "Homepage: $URL"
          echo "Version: $VERSION"
          echo "Maintainer: $MAINTAINER <$MAINTAINER_EMAIL>"
          echo "Architecture: all"
          echo "Depends: python3, python3-gi, gir1.2-gtk-4.0, gir1.2-adw-1"
          } > $GITHUB_WORKSPACE/pkg/DEBIAN/control
      - name: Install files
        run: |
          install -Dm755 main.py "$GITHUB_WORKSPACE/pkg/usr/lib/shaweelTimer/main.py"
          install -Dm755 status.py "$GITHUB_WORKSPACE/pkg/usr/lib/shaweelTimer/status.py"
          install -Dm755 config.py "$GITHUB_WORKSPACE/pkg/usr/lib/shaweelTimer/config.py"
          install -Dm644 metadata.json "$GITHUB_WORKSPACE/pkg/usr/lib/shaweelTimer/metadata.json"
          install -Dm644 assets/shaweelTimer.png "$GITHUB_WORKSPACE/pkg/usr/share/icons/hicolor/256x256/apps/shaweeltimer.png"
      - name: Add to path
        run: |
          mkdir -p $GITHUB_WORKSPACE/pkg/usr/bin
          {
          echo "#!/bin/sh"
          echo "export GSK_RENDERER=ngl"
          echo 'exec python3 /usr/lib/shaweelTimer/main.py "$@"'
          } > $GITHUB_WORKSPACE/pkg/usr/bin/shaweeltimer
          chmod 755 $GITHUB_WORKSPACE/pkg/usr/bin/shaweeltimer
      - name: Create .desktop shortcut
        run: |
          mkdir -p $GITHUB_WORKSPACE/pkg/usr/share/applications
          {
          echo "[Desktop Entry]"
          echo "Name=shaweelTimer"
          echo "Exec=shaweeltimer"
          echo "Icon=shaweeltimer"
          echo "Type=Application"
          echo "Categories=Utility;"
          } > $GITHUB_WORKSPACE/pkg/usr/share/applications/shaweeltimer.desktop
          chmod 755 $GITHUB_WORKSPACE/pkg/usr/share/applications/shaweeltimer.desktop
      - name: Build .deb file
        run: |
          dpkg-deb --build $GITHUB_WORKSPACE/pkg $GITHUB_WORKSPACE/shaweeltimer-${{github.ref_name}}-$VERSION.deb
      - name: Upload .deb file as artifact
        uses: actions/upload-artifact@v6
        with:
          name: shaweelTimerDebian-${{github.ref_name}}-${{env.VERSION}}
          path: ${{ github.workspace }}/shaweeltimer-${{github.ref_name}}-${{env.VERSION}}.deb
  buildRpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Fetch metadata
        run: |
          fetchMetadataValue() {
            curl -s https://raw.githubusercontent.com/shaweel/shaweelTimer/refs/heads/${{ github.ref_name }}/metadata.json \
            | grep -o "\"$1\": *\"[^\"]*\"" \
            | sed 's/.*: *"\(.*\)"/\1/'
          }
          echo "PACKAGE_NAME=$(fetchMetadataValue "packageName")" >> $GITHUB_ENV
          echo "DESCRIPTION=$(fetchMetadataValue "description")" >> $GITHUB_ENV
          echo "VERSION=$(fetchMetadataValue "version")" >> $GITHUB_ENV
          echo "URL=$(fetchMetadataValue "url")" >> $GITHUB_ENV
          echo "MAINTAINER=$(fetchMetadataValue "maintainer")" >> $GITHUB_ENV
      
          echo "MAINTAINER_EMAIL=$(fetchMetadataValue "maintainerEmail")" >> $GITHUB_ENV
      - name: Add to path
        run: |
          {
          echo "#!/bin/sh"
          echo "export GSK_RENDERER=ngl"
          echo 'exec python3 /usr/lib/shaweelTimer/main.py "$@"'
          } > $GITHUB_WORKSPACE/shaweeltimer
          chmod 755 $GITHUB_WORKSPACE/shaweeltimer
      - name: Create .desktop shortcut
        run: |
          {
          echo "[Desktop Entry]"
          echo "Name=shaweelTimer"
          echo "Exec=shaweeltimer"
          echo "Icon=shaweeltimer"
          echo "Type=Application"
          echo "Categories=Utility;"
          } > $GITHUB_WORKSPACE/shaweeltimer.desktop
          chmod 755 $GITHUB_WORKSPACE/shaweeltimer.desktop
      - name: "Create needed directories"
        run: mkdir -p $GITHUB_WORKSPACE/rpm/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
      - name: Create rpm spec file
        run: |
          {
          echo "Name: $PACKAGE_NAME"
          echo "URL: $URL"
          echo "Version: $VERSION"
          echo "Release: 1%{?dist}"
          echo "Summary: $DESCRIPTION"
          echo "Packager: $MAINTAINER <$MAINTAINER_EMAIL>"
          echo "BuildArch: noarch"
          echo "License: GPL-3.0-or-later"
          echo ""
          echo "%description"
          echo "$DESCRIPTION"
          echo ""
          echo "%install"
          echo "install -Dm755 main.py %{buildroot}/usr/lib/shaweelTimer/main.py"
          echo "install -Dm755 status.py %{buildroot}/usr/lib/shaweelTimer/status.py"
          echo "install -Dm755 config.py %{buildroot}/usr/lib/shaweelTimer/config.py"
          echo "install -Dm755 $GITHUB_WORKSPACE/shaweeltimer %{buildroot}/usr/bin/shaweeltimer"
          echo "install -Dm755 $GITHUB_WORKSPACE/shaweeltimer.desktop %{buildroot}/usr/share/applications/shaweeltimer.desktop"
          echo "install -Dm644 metadata.json %{buildroot}/usr/lib/shaweelTimer/metadata.json"
          echo "install -Dm644 assets/shaweelTimer.png %{buildroot}/usr/share/icons/hicolor/256x256/apps/shaweeltimer.png"
          echo ""
          echo "%files"
          echo "/usr/lib/shaweelTimer/*"
          echo "/usr/bin/shaweelTimer"
          echo "/usr/share/icons/hicolor/256x256/apps/shaweeltimer.png"
          echo "/usr/share/applications/shaweeltimer.desktop"
          } > $GITHUB_WORKSPACE/rpm/SPECS/shaweeltimer.spec
      - name: Build .rpm file
        run: |
          rpmbuild -bb --define "_topdir $GITHUB_WORKSPACE/rpm" $GITHUB_WORKSPACE/rpm/SPECS/shaweeltimer.spec


