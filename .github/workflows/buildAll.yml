name: Build All

on:
  push:
    branches: [stable, dev]
  pull_request:
    branches: [stable, dev]

jobs:
  buildDeb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Fetch version
        run: |
            echo "VERSION=$(curl -s https://raw.githubusercontent.com/shaweel/shaweelTimer/refs/heads/stable/metadata.json | grep version | sed 's/.*"version": "\(.*\)".*/\1/')" >> $GITHUB_ENV
      - name: Check version
        run: |
          echo "Version: ${{env.VERSION}}"