name: Build App
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-python-cairo
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pyinstaller
      - name: Install PyInstaller
        shell: msys2 {0}
        run: pip install pyinstaller
      - name: Build EXE
        shell: msys2 {0}
        run: |
          pyinstaller --onefile --name "shaweelTimer" \
            --add-data "$MINGW_PREFIX/lib/girepository-1.0:lib/girepository-1.0" \
            --add-data "$MINGW_PREFIX/share/glib-2.0/schemas:share/glib-2.0/schemas" \
            --add-data "$MINGW_PREFIX/lib/gdk-pixbuf-2.0:lib/gdk-pixbuf-2.0" \
            --add-data "$MINGW_PREFIX/share/icons:share/icons" \
            --collect-all gi \
            main.py
      - name: Upload EXE
        uses: actions/upload-artifact@v6
        with:
          name: shaweelTimer-windows
          path: dist/shaweelTimer.exe

  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build .deb
        run: |
          mkdir -p deb-pkg/DEBIAN
          mkdir -p deb-pkg/usr/bin
          mkdir -p deb-pkg/usr/lib/shaweeltimer
          cp main.py deb-pkg/usr/lib/shaweeltimer/
          printf 'Package: shaweeltimer\nVersion: 1.0.0\nArchitecture: all\nMaintainer: shaweel <shaweel@proton.me>\nDepends: python3, python3-gi, python3-gi-cairo, gir1.2-gtk-4.0\nDescription: shaweelTimer\n' \
            > deb-pkg/DEBIAN/control
          printf '#!/bin/bash\npython3 /usr/lib/shaweeltimer/main.py "$@"' \
            > deb-pkg/usr/bin/shaweeltimer
          chmod +x deb-pkg/usr/bin/shaweeltimer
          dpkg-deb --build deb-pkg shaweelTimer.deb
      - uses: actions/upload-artifact@v6
        with:
          name: shaweelTimer-debian
          path: shaweelTimer.deb

  build-rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install rpm tools
        run: sudo apt-get install -y rpm
      - name: Build .rpm
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p ~/rpmbuild/SOURCES/shaweelTimer-1.0.0/usr/bin
          mkdir -p ~/rpmbuild/SOURCES/shaweelTimer-1.0.0/usr/lib/shaweelTimer
          cp main.py ~/rpmbuild/SOURCES/shaweelTimer-1.0.0/usr/lib/shaweelTimer/
          printf '#!/bin/bash\npython3 /usr/lib/shaweelTimer/main.py "$@"' \
            > ~/rpmbuild/SOURCES/shaweelTimer-1.0.0/usr/bin/shaweelTimer
          chmod +x ~/rpmbuild/SOURCES/shaweelTimer-1.0.0/usr/bin/shaweelTimer
          printf 'Name: shaweelTimer\nVersion: 1.0.0\nRelease: 1%%{?dist}\nSummary: shaweelTimer\nLicense: MIT\nBuildArch: noarch\nRequires: python3, python3-gobject, gtk4\n\n%%description\nshaweelTimer\n\n%%install\ncp -r %%{_sourcedir}/shaweelTimer-1.0.0/* %%{buildroot}/\n\n%%files\n/usr/bin/shaweelTimer\n/usr/lib/shaweelTimer/main.py\n' \
            > ~/rpmbuild/SPECS/shaweelTimer.spec
          rpmbuild -bb ~/rpmbuild/SPECS/shaweelTimer.spec
      - name: Rename RPM
        run: cp ~/rpmbuild/RPMS/noarch/shaweelTimer-*.rpm ~/rpmbuild/RPMS/noarch/shaweelTimer.rpm
      - name: Upload RPM
        uses: actions/upload-artifact@v6
        with:
          name: shaweelTimer-fedora
          path: ~/rpmbuild/RPMS/noarch/shaweelTimer.rpm
