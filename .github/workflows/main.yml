name: Build App
on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  buildExe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-python-cairo
            mingw-w64-x86_64-libadwaita
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pyinstaller
      - name: Install PyInstaller
        shell: msys2 {0}
        run: pip install pyinstaller
      - name: Convert icon
        shell: msys2 {0}
        run: |
          pip install pillow
          python -c "from PIL import Image; img = Image.open('assets/shaweelTimer.png'); img.save('assets/shaweelTimer.ico')"
      - name: Build EXE
        shell: msys2 {0}
        run: |
          MINGW_WIN=$(cygpath -w $MINGW_PREFIX)
          pyinstaller --onefile --name "shaweelTimer" \
            --icon "assets/shaweelTimer.ico" \
            --add-data "$MINGW_WIN/lib/girepository-1.0;lib/girepository-1.0" \
            --add-data "$MINGW_WIN/share/glib-2.0/schemas;share/glib-2.0/schemas" \
            --add-data "$MINGW_WIN/lib/gdk-pixbuf-2.0;lib/gdk-pixbuf-2.0" \
            --add-data "$MINGW_WIN/share/icons;share/icons" \
            --collect-all gi \
            main.py
      - name: Upload EXE
        uses: actions/upload-artifact@v6
        with:
          name: shaweelTimerWindows
          path: dist/shaweelTimer.exe

  buildDeb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=version=")[^"]+' me.shaweel.shaweelTimer.metainfo.xml | head -1)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Build .deb
        run: |
          mkdir -p deb-pkg/DEBIAN
          mkdir -p deb-pkg/usr/bin
          mkdir -p deb-pkg/usr/lib/shaweeltimer
          mkdir -p deb-pkg/usr/share/icons/hicolor/256x256/apps
          mkdir -p deb-pkg/usr/share/applications
          mkdir -p deb-pkg/usr/share/metainfo
          cp *.py deb-pkg/usr/lib/shaweeltimer/
          cp assets/shaweelTimer.png deb-pkg/usr/share/icons/hicolor/256x256/apps/shaweeltimer.png
          cp me.shaweel.shaweelTimer.metainfo.xml deb-pkg/usr/share/metainfo/
          {
            echo 'Package: shaweeltimer'
            echo 'Version: ${{ steps.version.outputs.VERSION }}'
            echo 'Architecture: all'
            echo 'Maintainer: shaweel <shaweel@proton.me>'
            echo 'Depends: python3, python3-gi, python3-gi-cairo, gir1.2-gtk-4.0, gir1.2-adw-1'
            echo 'Description: shaweelTimer'
          } > deb-pkg/DEBIAN/control
          {
            echo '#!/bin/bash'
            echo 'GSK_RENDERER=ngl python3 /usr/lib/shaweeltimer/main.py "$@"'
          } > deb-pkg/usr/bin/shaweeltimer
          chmod +x deb-pkg/usr/bin/shaweeltimer
          {
            echo '[Desktop Entry]'
            echo 'Name=shaweelTimer'
            echo 'Exec=shaweeltimer'
            echo 'Icon=shaweeltimer'
            echo 'Type=Application'
            echo 'Categories=Utility;'
          } > deb-pkg/usr/share/applications/shaweeltimer.desktop
          dpkg-deb --build deb-pkg shaweelTimer.deb
      - uses: actions/upload-artifact@v6
        with:
          name: shaweelTimerDebian
          path: shaweelTimer.deb

  buildRpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=version=")[^"]+' me.shaweel.shaweelTimer.metainfo.xml | head -1)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Install rpm tools
        run: sudo apt-get install -y rpm
      - name: Build .rpm
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p ~/rpmbuild/SOURCES/shaweeltimer-${{ steps.version.outputs.VERSION }}/usr/bin
          mkdir -p ~/rpmbuild/SOURCES/shaweeltimer-${{ steps.version.outputs.VERSION }}/usr/lib/shaweeltimer
          mkdir -p ~/rpmbuild/SOURCES/shaweeltimer-${{ steps.version.outputs.VERSION }}/usr/share/icons/hicolor/256x256/apps
          mkdir -p ~/rpmbuild/SOURCES/shaweeltimer-${{ steps.version.outputs.VERSION }}/usr/share/applications
          mkdir -p ~/rpmbuild/SOURCES/shaweeltimer-${{ steps.version.outputs.VERSION }}/usr/share/metainfo
          cp *.py ~/rpmbuild/SOURCES/shaweeltimer-${{ steps.version.outputs.VERSION }}/usr/lib/shaweeltimer/
          cp assets/shaweelTimer.png ~/rpmbuild/SOURCES/shaweeltimer-${{ steps.version.outputs.VERSION }}/usr/share/icons/hicolor/256x256/apps/shaweeltimer.png
          cp me.shaweel.shaweelTimer.metainfo.xml ~/rpmbuild/SOURCES/shaweeltimer-${{ steps.version.outputs.VERSION }}/usr/share/metainfo/
          {
            echo '#!/bin/bash'
            echo 'python3 /usr/lib/shaweeltimer/main.py "$@"'
          } > ~/rpmbuild/SOURCES/shaweeltimer-${{ steps.version.outputs.VERSION }}/usr/bin/shaweeltimer
          chmod +x ~/rpmbuild/SOURCES/shaweeltimer-${{ steps.version.outputs.VERSION }}/usr/bin/shaweeltimer
          {
            echo '[Desktop Entry]'
            echo 'Name=shaweelTimer'
            echo 'Exec=shaweeltimer'
            echo 'Icon=shaweeltimer'
            echo 'Type=Application'
            echo 'Categories=Utility;'
          } > ~/rpmbuild/SOURCES/shaweeltimer-${{ steps.version.outputs.VERSION }}/usr/share/applications/shaweeltimer.desktop
          {
            echo 'Name: shaweelTimer'
            echo 'Version: ${{ steps.version.outputs.VERSION }}'
            echo 'Release: 1%{?dist}'
            echo 'Summary: shaweelTimer'
            echo 'License: GPL-3.0-or-later'
            echo 'BuildArch: noarch'
            echo 'Requires: python3, python3-gobject, gtk4, libadwaita, libGLESv2.so.2'
            echo ''
            echo '%description'
            echo 'shaweelTimer'
            echo ''
            echo '%install'
            echo 'cp -r %{_sourcedir}/shaweeltimer-${{ steps.version.outputs.VERSION }}/* %{buildroot}/'
            echo ''
            echo '%files'
            echo '/usr/bin/shaweeltimer'
            echo '/usr/lib/shaweeltimer/main.py'
            echo '/usr/lib/shaweeltimer/config.py'
            echo '/usr/lib/shaweeltimer/status.py'
            echo '/usr/share/applications/shaweeltimer.desktop'
            echo '/usr/share/icons/hicolor/256x256/apps/shaweeltimer.png'
            echo '/usr/share/metainfo/me.shaweel.shaweelTimer.metainfo.xml'
          } > ~/rpmbuild/SPECS/shaweeltimer.spec
          rpmbuild -bb ~/rpmbuild/SPECS/shaweeltimer.spec
      - name: Rename RPM
        run: cp ~/rpmbuild/RPMS/noarch/shaweelTimer-*.rpm ~/rpmbuild/RPMS/noarch/shaweelTimer.rpm
      - name: Upload RPM
        uses: actions/upload-artifact@v6
        with:
          name: shaweelTimerFedora
          path: ~/rpmbuild/RPMS/noarch/shaweelTimer.rpm

  buildFlatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=version=")[^"]+' me.shaweel.shaweelTimer.metainfo.xml | head -1)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Cache flatpak runtimes
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-gnome-49
      - name: Install flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//49 org.gnome.Sdk//49
      - name: Create desktop file
        run: |
          {
            echo '[Desktop Entry]'
            echo 'Name=shaweelTimer'
            echo 'Exec=shaweeltimer'
            echo 'Icon=me.shaweel.shaweelTimer'
            echo 'Type=Application'
            echo 'Categories=Utility;'
          } > me.shaweel.shaweelTimer.desktop
      - name: Create manifest
        run: |
          {
            echo 'app-id: me.shaweel.shaweelTimer'
            echo 'runtime: org.gnome.Platform'
            echo "runtime-version: '49'"
            echo 'sdk: org.gnome.Sdk'
            echo 'command: shaweeltimer'
            echo 'finish-args:'
            echo '  - --socket=wayland'
            echo '  - --socket=fallback-x11'
            echo '  - --share=ipc'
            echo 'modules:'
            echo '  - name: shaweeltimer'
            echo '    buildsystem: simple'
            echo '    build-commands:'
            echo '      - install -Dm755 main.py /app/bin/shaweeltimer'
            echo '      - install -Dm755 config.py /app/bin/config.py'
            echo '      - install -Dm755 status.py /app/bin/status.py'
            echo '      - install -Dm644 shaweelTimer.png /app/share/icons/hicolor/256x256/apps/me.shaweel.shaweelTimer.png'
            echo '      - install -Dm644 me.shaweel.shaweelTimer.desktop /app/share/applications/me.shaweel.shaweelTimer.desktop'
            echo '      - install -Dm644 me.shaweel.shaweelTimer.metainfo.xml /app/share/metainfo/me.shaweel.shaweelTimer.metainfo.xml'
            echo '      - install -Dm644 all.png /app/share/screenshots/me.shaweel.shaweelTimer/all.png'
            echo '      - install -Dm644 main.png /app/share/screenshots/me.shaweel.shaweelTimer/main.png'
            echo '      - install -Dm644 preferences.png /app/share/screenshots/me.shaweel.shaweelTimer/preferences.png'
            echo '      - install -Dm644 colorfulConfig.png /app/share/screenshots/me.shaweel.shaweelTimer/colorfulConfig.png'
            echo '      - sed -i "1s|^|#!/usr/bin/env python3\n|" /app/bin/shaweeltimer'
            echo '    sources:'
            echo '      - type: file'
            echo '        path: assets/screenshots/all.png'
            echo '      - type: file'
            echo '        path: assets/screenshots/main.png'
            echo '      - type: file'
            echo '        path: assets/screenshots/preferences.png'
            echo '      - type: file'
            echo '        path: assets/screenshots/colorfulConfig.png'
            echo '      - type: file'
            echo '        path: main.py'
            echo '      - type: file'
            echo '        path: config.py'
            echo '      - type: file'
            echo '        path: status.py'
            echo '      - type: file'
            echo '        path: assets/shaweelTimer.png'
            echo '      - type: file'
            echo '        path: me.shaweel.shaweelTimer.desktop'
            echo '      - type: file'
            echo '        path: me.shaweel.shaweelTimer.metainfo.xml'
          } > me.shaweel.shaweelTimer.yml
      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --repo=repo build-dir me.shaweel.shaweelTimer.yml
          flatpak build-bundle repo shaweelTimer.flatpak me.shaweel.shaweelTimer
      - uses: actions/upload-artifact@v6
        with:
          name: shaweelTimerFlatpak
          path: shaweelTimer.flatpak
